name: CI

on:
  pull_request:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Check Lua syntax
        run: luac5.4 -p main.lua

      - name: Check required package files
        run: |
          test -f main.lua
          test -f README.md
          test -f LICENSE
